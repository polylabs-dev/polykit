[component]
name = "polykit-rate-limiter"
version = "0.2.0"
category = "smart-circuit"
implementation_type = "FastLang"
status = "Published"
description = "Per-tier rate limiting with sliding window FSM, WAL persistence, rollback on failure, bounded history"
license = "Apache-2.0"
repository = "https://github.com/polylabs-dev/polykit"
keywords = ["rate-limit", "throttle", "sliding-window", "fsm", "backpressure"]

[component.author]
name = "Poly Labs"
email = "engineering@polylabs.dev"
url = "https://polylabs.dev"

[component.marketplace]
pricing = "free"
visibility = "open"

[component.estream]
min_version = "0.12.0"

[component.dependencies]

[component.schemas]
provides = ["RateCheckResult", "RateWindow"]
requires = []

[component.circuits]
provides = ["check_rate", "record_operation"]
target = ["cpu"]

[component.lifecycle]
status = "active"
breaking_change_notice_days = 90
changelog = "CHANGELOG.md"

[component.include]
circuits = ["rate_limiter.fl"]
