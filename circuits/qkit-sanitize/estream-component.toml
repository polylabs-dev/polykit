[component]
name = "qkit-sanitize"
version = "0.2.0"
category = "smart-circuit"
implementation_type = "FastLang"
status = "Published"
description = "3-stage compliance sanitization: PII detection, value transform, PoVC-witnessed audit. HIPAA/PCI-DSS/GDPR/SOC2/CCPA"
license = "Apache-2.0"
repository = "https://github.com/polylabs-dev/qkit"
keywords = ["sanitization", "pii", "compliance", "hipaa", "gdpr", "pci-dss", "audit"]

[component.author]
name = "PolyQ Labs"
email = "engineering@polyqlabs.dev"
url = "https://polyqlabs.dev"

[component.marketplace]
pricing = "free"
visibility = "open"

[component.estream]
min_version = "0.12.0"

[component.dependencies]

[component.schemas]
provides = ["SanitizationResult", "Detection", "AuditEntry"]
requires = []

[component.circuits]
provides = ["sanitize", "detect_only"]
target = ["cpu"]

[component.lifecycle]
status = "active"
breaking_change_notice_days = 90
changelog = "CHANGELOG.md"

[component.include]
circuits = ["sanitize.fl"]
