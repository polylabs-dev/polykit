[component]
name = "qkit-console"
version = "0.2.0"
category = "console-widget"
implementation_type = "FastLang"
status = "Published"
description = "Shared console infrastructure: widget registry graph, typed event bus, RBAC access control, render-ready payloads"
license = "Apache-2.0"
repository = "https://github.com/polylabs-dev/qkit"
keywords = ["console", "widgets", "rbac", "event-bus", "dashboard"]

[component.author]
name = "PolyQ Labs"
email = "engineering@polyqlabs.dev"
url = "https://polyqlabs.dev"

[component.marketplace]
pricing = "free"
visibility = "open"

[component.estream]
min_version = "0.12.0"

[component.dependencies]

[component.schemas]
provides = ["WidgetPayload", "WidgetEvent", "AccessCheck"]
requires = []

[component.circuits]
provides = ["check_access", "format_role", "process_widgets", "emit_widget_event"]
target = ["cpu"]

[component.widget]
widget_category = "analytics"
roles = ["viewer", "operator", "compliance"]
sizes = ["small", "medium", "large"]
data_sources = ["lex-stream"]

[component.lifecycle]
status = "active"
breaking_change_notice_days = 90
changelog = "CHANGELOG.md"

[component.include]
circuits = ["console.fl"]
