[component]
name = "polykit-metering"
version = "0.2.0"
category = "smart-circuit"
implementation_type = "FastLang"
status = "Published"
description = "8-dimension resource metering: executions, hashes, bandwidth, storage, observables, proofs, circuits, MPC sessions"
license = "Apache-2.0"
repository = "https://github.com/polylabs-dev/polykit"
keywords = ["metering", "billing", "usage", "rate-limit", "dimensions"]

[component.author]
name = "Poly Labs"
email = "engineering@polylabs.dev"
url = "https://polylabs.dev"

[component.marketplace]
pricing = "free"
visibility = "open"

[component.estream]
min_version = "0.12.0"

[component.dependencies]

[component.schemas]
provides = ["DimensionValues", "MeteringRecord", "TierLimits", "MeteringDimension"]
requires = []

[component.circuits]
provides = ["record_usage", "check_limits", "get_usage_summary", "accumulate"]
target = ["cpu"]

[component.lifecycle]
status = "active"
breaking_change_notice_days = 90
changelog = "CHANGELOG.md"

[component.include]
circuits = ["metering.fl"]
