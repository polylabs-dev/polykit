[package]
name = "qkit"
version = "0.11.0"
description = "Shared SDK for all PolyQ Labs products — identity, metering, rate limiting, governance, zero-linkage privacy"
lex = "esn/global/org/polyqlabs"

[platform]
estream = "0.22.0"
target = ["wasm_client", "alpha_devnet"]

[circuits]
path = "circuits/fl"
count = 26

[circuits.groups]
core = ["qkit_identity", "qkit_metering", "qkit_rate_limiter", "qkit_blind_telemetry"]
compliance = ["qkit_sanitize", "qkit_governance"]
intelligence = ["qkit_li_effects", "qkit_delta_curate"]
regional = ["qkit_regional_us", "qkit_regional_eu"]
apps = ["qkit_media_stream", "qkit_crdt_sync", "qkit_blind_relay", "qkit_classified_fusion"]
zero_linkage = ["qkit_zero_linkage", "qkit_blinded_billing", "qkit_bridge"]
graphs = ["qkit_user_graph", "qkit_metering_graph", "qkit_subscription_lifecycle"]
cognitive = ["qkit_cognitive", "qkit_noise_filter", "qkit_sme", "qkit_app_graph"]

[telemetry]
context = "poly-qkit-telemetry-v1"
blind = true
cohort_min = 50
aggregate_window_ms = 3600000

[transport]
protocol = "wire-udp"
port = 5000
quic_port = 4433

[security]
signing = "ml-dsa-87"
encryption = "ml-kem-1024"
hkdf = "sha3-256"
zero_linkage = true

[deployment]
node = "alpha-devnet"
endpoint = "estream://136.113.92.232:5000/polylabs-dev/qkit"
